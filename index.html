<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aysha's Blog</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffe4e1;
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 70px;
            color: #8B5E83;
            margin-top: 100px;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
            color: #555;
            width: 70%;
            margin: auto;
            line-height: 1.6;
        }

        button {
            margin-top: 40px;
            padding: 15px 35px;
            font-size: 18px;
            background-color: #8B5E83;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        button:hover {
            background-color: #6f4669;
        }
    </style>
</head>

<body>

    <h1>Welcome to Aysha's Blog!</h1>

    <p>
        Hi! I'm Aysha. Welcome to my little corner of the internet where I'll be sharing my thoughts,
        experiences, projects, and everything I'm passionate about.
    </p>

    <button>Read My Blog</button>

</body>
</html>
